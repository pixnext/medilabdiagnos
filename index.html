    const useCountUp = (end, duration = 2000, decimals = 0) => {
      const [val, setVal] = useState(0);
      const [seen, setSeen] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setSeen(true); }, { threshold: 0.4 });
        obs.observe(el); return () => obs.disconnect();
      }, []);
      useEffect(() => {
        if (!seen) return;
        let start = 0, t0 = null;
        const step = (ts) => {
          if (!t0) t0 = ts;
          const p = Math.min((ts - t0) / duration, 1);
          const cur = p * end;
          start = cur;
          setVal(decimals ? cur.toFixed(1) : Math.floor(cur));
          if (p < 1) requestAnimationFrame(step);
          else setVal(end);
        };
        requestAnimationFrame(step);
      }, [seen, end, duration, decimals]);
      return { ref, val };
    };

    const SectionObserver = ({ children }) => {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('active'); });
        }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
        el.querySelectorAll('.reveal').forEach(c => obs.observe(c));
        return () => obs.disconnect();
      }, []);
      return <div ref={ref}>{children}</div>;
    };

    const HeroScene = () => {
      const mountRef = useRef(null);
      useEffect(() => {
        const mount = mountRef.current;
        const w = mount.clientWidth;
        const h = mount.clientHeight;

        const point = new THREE.PointLight(0x14b8a6, 2, 25);
        point.position.set(-6, 2, 2);
        scene.add(point);

        // DNA Helix
        const dnaGroup = new THREE.Group();
        const sGeo = new THREE.SphereGeometry(0.16, 16, 16);
        const blueMat = new THREE.MeshStandardMaterial({ color: 0x0284c7, roughness: 0.2, metalness: 0.7 });
        const tealMat = new THREE.MeshStandardMaterial({ color: 0x0d9488, roughness: 0.2, metalness: 0.5 });

        const rungMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, roughness: 0.3, metalness: 0.8 });
        for (let i=0; i<32; i++){
          const y = (i-16)*0.38;
          const a1 = i*0.35; const a2 = a1+Math.PI; const r=1.3;
          const x1=Math.cos(a1)*r, z1=Math.sin(a1)*r;
          const x2=Math.cos(a2)*r, z2=Math.sin(a2)*r;

        cross.add(b1); cross.add(b2); cross.position.set(4.5, 1.5, -2); scene.add(cross);

        // Microscope (abstract)
        const scope = new THREE.Group();
        const metal = new THREE.MeshStandardMaterial({ color:0x94a3b8, roughness:0.2, metalness:0.9 });
        const base = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 1, 0.2, 32), metal); scope.add(base);
        const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2.2, 12), metal); arm.position.set(0.6, 1.1, 0); arm.rotation.z=-0.25; scope.add(arm);
        const stage = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.8), metal); stage.position.set(0, 0.6, 0); scope.add(stage);
        scope.position.set(-4.2, -1, -3); scene.add(scope);

        // Test Tubes
        const tubeGeo = new THREE.CylinderGeometry(0.16, 0.16, 1.3, 16);
        const tMat1 = new THREE.MeshPhysicalMaterial({ color:0xf59e0b, transparent:true, opacity:0.85, roughness:0.1, transmission:0.3 });
        const tMat2 = new THREE.MeshPhysicalMaterial({ color:0xec4899, transparent:true, opacity:0.85, roughness:0.1, transmission:0.3 });
        const t1=new THREE.Mesh(tubeGeo, tMat1); t1.position.set(3.2, -1.8, 1); scene.add(t1);
        const t2=new THREE.Mesh(tubeGeo, tMat2); t2.position.set(3.8, -2,0.4); scene.add(t2);

        // Particles
        const pGeo = new THREE.BufferGeometry();
        const pCount = 900;
        const pos = new Float32Array(pCount*3);
        for(let i=0;i<pCount*3;i++) pos[i] = (Math.random()-0.5)*30;
        pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const pMat = new THREE.PointsMaterial({ size:0.06, color:0x38bdf8, transparent:true, opacity:0.55 });
        const particles = new THREE.Points(pGeo, pMat);
 scene.add(particles);

        let mx=0, my=0;

        window.addEventListener('mousemove', onMove);

        let frame;
        const animate = () => {
          frame = requestAnimationFrame(animate);
          const t = Date.now()*0.001;

 dnaGroup.rotation.y = t*0.25;
          dnaGroup.position.y = Math.sin(t)*0.25;

          holo.rotation.x = t*0.3; holo.rotation.y = t*0.5;

          t1.rotation.z = Math.sin(t*2)*0.1;

          particles.rotation.y = t*0.04;

          camera.position.x += (mx*1.8 - camera.position.x)*0.04;

          camera.lookAt(0,0,0);

        };
        animate();

 mount.removeChild(renderer.domElement);
